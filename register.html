<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Register — Attendance</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  min-height: 100vh; background: #0d1117;
  display: flex; align-items: center; justify-content: center; padding: 20px;
  overflow: hidden; position: relative;
}
body::before {
  content: ''; position: absolute; width: 400px; height: 400px;
  background: #8b5cf6; border-radius: 50%; filter: blur(100px);
  opacity: 0.12; top: -120px; right: -100px;
}
.card {
  background: rgba(255,255,255,0.04); backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 28px;
  padding: 44px 36px; width: 100%; max-width: 400px;
  z-index: 1; box-shadow: 0 32px 80px rgba(0,0,0,0.5);
  animation: slideUp 0.4s ease;
}
@keyframes slideUp { from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);} }

.step-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(139,92,246,0.12); border: 1px solid rgba(139,92,246,0.3);
  color: #c4b5fd; border-radius: 20px; padding: 5px 14px;
  font-size: 12px; font-weight: 600; margin-bottom: 24px;
}
h2   { font-size: 26px; font-weight: 800; color: white; margin-bottom: 8px; }
.sub { color: rgba(255,255,255,0.4); font-size: 14px; margin-bottom: 28px; line-height: 1.5; }

.phone-pill {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px; padding: 10px 16px; margin-bottom: 28px; width: 100%;
  color: rgba(255,255,255,0.7); font-size: 14px;
}
.phone-pill strong { color: white; }

label { display: block; color: rgba(255,255,255,0.5); font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
input[type="text"] {
  width: 100%; background: rgba(255,255,255,0.07);
  border: 1.5px solid rgba(255,255,255,0.12);
  border-radius: 14px; padding: 16px 18px;
  font-size: 16px; color: white; outline: none;
  font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600;
  transition: border-color 0.2s; margin-bottom: 22px;
}
input[type="text"]:focus { border-color: #8b5cf6; }
input[type="text"]::placeholder { color: rgba(255,255,255,0.2); font-weight: 400; }

.btn {
  width: 100%; padding: 17px;
  background: linear-gradient(135deg, #8b5cf6, #6366f1);
  color: white; border: none; border-radius: 16px;
  font-size: 16px; font-weight: 700; cursor: pointer;
  font-family: 'Plus Jakarta Sans', sans-serif;
  box-shadow: 0 6px 24px rgba(139,92,246,0.35);
  transition: opacity 0.2s, transform 0.15s;
}
.btn:hover { opacity: 0.9; transform: translateY(-1px); }
.error {
  background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
  color: #fca5a5; border-radius: 12px; padding: 12px 16px;
  font-size: 13px; margin-bottom: 20px; text-align: center;
}
.back { display: block; text-align: center; margin-top: 18px; color: rgba(255,255,255,0.3); font-size: 13px; text-decoration: none; }
.back:hover { color: rgba(255,255,255,0.6); }
</style>
</head>
<body>
<div class="card">
  <span class="step-badge">🆕 New User — Step 1 of 2</span>
  <h2>Welcome! 👋</h2>
  <p class="sub">You're new here. Tell us your name and we'll send you a one-time code to verify.</p>

  <div class="phone-pill">📱 <strong>{{ phone }}</strong></div>

  {% if error %}<div class="error">⚠️ {{ error }}</div>{% endif %}

  <form method="POST" action="/register">
    <input type="hidden" name="phone" value="{{ phone }}">
    <label>Full Name</label>
    <input type="text" name="name" placeholder="Enter your full name" required autofocus>
    <button type="submit" class="btn">Send OTP & Register →</button>
  </form>

  <a href="/start" class="back">← Use a different number</a>
</div>
</body>
</html>

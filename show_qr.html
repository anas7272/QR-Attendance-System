<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scan to Mark Attendance</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:  #0f2040;
  --teal:  #06d6a0;
  --blue:  #3b82f6;
  --gold:  #f59e0b;
}

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  min-height: 100vh;
  background: var(--navy);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 30px 20px;
  position: relative; overflow: hidden;
}

/* animated blobs */
.blob {
  position: absolute; border-radius: 50%;
  filter: blur(100px); pointer-events: none; opacity: 0.18;
  animation: drift 10s ease-in-out infinite alternate;
}
.blob1 { width:500px;height:500px; background:var(--teal);  top:-150px; left:-150px; animation-delay:0s; }
.blob2 { width:400px;height:400px; background:var(--blue);  bottom:-100px; right:-100px; animation-delay:4s; }
.blob3 { width:300px;height:300px; background:var(--gold);  top:50%; left:50%; transform:translate(-50%,-50%); animation-delay:7s; }
@keyframes drift { from{transform:scale(1) translate(0,0);} to{transform:scale(1.15) translate(20px,15px);} }

/* grid bg */
body::before {
  content:''; position:absolute; inset:0;
  background-image: linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),
                    linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);
  background-size: 44px 44px;
  pointer-events:none;
}

.card {
  position: relative; z-index: 2;
  display: flex; flex-direction: column; align-items: center;
  text-align: center;
  max-width: 480px; width: 100%;
}

/* top badge */
.top-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(6,214,160,0.12); border: 1px solid rgba(6,214,160,0.3);
  color: var(--teal); border-radius: 30px; padding: 7px 20px;
  font-size: 13px; font-weight: 700; letter-spacing: 0.5px;
  margin-bottom: 28px;
}
.pulse-dot {
  width: 8px; height: 8px; background: var(--teal);
  border-radius: 50%; flex-shrink: 0;
  animation: pulse 1.4s infinite;
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(6,214,160,0.6); }
  50%      { box-shadow: 0 0 0 7px rgba(6,214,160,0); }
}

/* heading */
h1 {
  font-size: clamp(28px,5vw,44px);
  font-weight: 900; color: white; line-height: 1.1;
  margin-bottom: 10px; letter-spacing: -1px;
}
h1 span { color: var(--teal); }
.sub { color: rgba(255,255,255,0.4); font-size: 15px; margin-bottom: 40px; }

/* QR box */
.qr-outer {
  position: relative;
  background: white;
  border-radius: 28px;
  padding: 22px;
  box-shadow:
    0 0 0 1px rgba(6,214,160,0.3),
    0 0 60px rgba(6,214,160,0.2),
    0 30px 80px rgba(0,0,0,0.5);
  margin-bottom: 36px;
  animation: float 4s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-10px); }
}

/* corner accents */
.qr-outer::before, .qr-outer::after {
  content:''; position:absolute; width:22px; height:22px;
  border-color: var(--teal); border-style: solid;
  border-radius: 4px;
}
.qr-outer::before { top:-2px; left:-2px; border-width:3px 0 0 3px; }
.qr-outer::after  { bottom:-2px; right:-2px; border-width:0 3px 3px 0; }

.qr-outer img {
  width: 260px; height: 260px;
  display: block;
  border-radius: 8px;
}

/* scan arrow animation */
.scan-line {
  position: absolute; left: 22px; right: 22px;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--teal), transparent);
  border-radius: 2px;
  animation: scan 2.5s ease-in-out infinite;
  top: 22px;
}
@keyframes scan {
  0%   { top: 22px;  opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 1; }
  100% { top: calc(100% - 22px); opacity: 0; }
}

/* steps */
.steps {
  display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
  margin-bottom: 32px; width: 100%;
}
.step {
  flex: 1; min-width: 110px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px; padding: 16px 12px;
  color: rgba(255,255,255,0.7); font-size: 12px; font-weight: 600;
  line-height: 1.5;
}
.step .num {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, var(--blue), var(--teal));
  color: white; font-weight: 800; font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 10px;
}
.step .ico { font-size: 20px; margin-bottom: 6px; }

/* bottom note */
.note {
  display: flex; align-items: center; gap: 8px;
  background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.2);
  color: rgba(245,158,11,0.8); border-radius: 12px; padding: 10px 18px;
  font-size: 12px; font-weight: 600; margin-bottom: 20px;
}

/* download btn */
.dl-btn {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.5); padding: 10px 22px;
  border-radius: 20px; font-size: 13px; font-weight: 600;
  text-decoration: none; transition: color 0.2s, border-color 0.2s;
}
.dl-btn:hover { color: white; border-color: rgba(255,255,255,0.3); }

/* clock */
.clock-bar {
  position: fixed; bottom: 20px;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px; padding: 8px 24px;
  color: rgba(255,255,255,0.4); font-size: 13px; font-weight: 600;
  z-index: 10;
}
#live { color: white; }
</style>
</head>
<body>

<!-- blobs -->
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="card">

  <div class="top-badge">
    <span class="pulse-dot"></span>
    Attendance System · Live 24/7
  </div>

  <h1>Scan to Mark<br><span>Attendance</span></h1>
  <p class="sub">Point your phone camera at the QR code below</p>

  <!-- QR CODE -->
  <div class="qr-outer">
    <div class="scan-line"></div>
    <img src="data:image/png;base64,{{ qr_b64 }}" alt="Attendance QR Code">
  </div>

  <!-- STEPS -->
  <div class="steps">
    <div class="step">
      <div class="ico">📱</div>
      <div class="num">1</div>
      Scan this QR with your phone
    </div>
    <div class="step">
      <div class="ico">👤</div>
      <div class="num">2</div>
      Register once or login with OTP
    </div>
    <div class="step">
      <div class="ico">✅</div>
      <div class="num">3</div>
      Check In or Check Out instantly
    </div>
  </div>

 

  <a href="/qr-image" class="dl-btn">⬇ Download QR to Print</a>

</div>

<!-- live clock at bottom -->
<div class="clock-bar">
  <span id="live">--:--:--</span> &nbsp;·&nbsp; {{ app_url }}
</div>

<script>
function tick(){
  document.getElementById('live').textContent =
    new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
}
tick(); setInterval(tick,1000);
</script>
</body>
</html>
